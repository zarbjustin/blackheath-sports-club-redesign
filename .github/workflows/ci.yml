name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    name: Build, audit, Lighthouse & links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Security audit
        # Fail on high or critical vulnerabilities
        run: npm audit --audit-level=high

      - name: Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun

      - name: Link check
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # Check the built HTML for broken external links.
          # Social platforms and Google Maps frequently block bot requests — excluded to avoid
          # flaky failures unrelated to the site's own links.
          args: >-
            --verbose
            --no-progress
            --exclude-mail
            --timeout 15
            --max-retries 2
            --exclude "https://twitter\.com"
            --exclude "https://x\.com"
            --exclude "https://www\.facebook\.com"
            --exclude "https://maps\.google\.com"
            --exclude "https://www\.google\.com/maps"
            './dist/**/*.html'
          fail: true
